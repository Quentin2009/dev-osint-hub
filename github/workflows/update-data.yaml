name: Update Tools Data

on:
  schedule:
    # S'exécute tous les dimanches à minuit
    - cron: '0 0 * * 0'
  workflow_dispatch: # Permet de le lancer manuellement depuis GitHub

jobs:
  update:
    runs-runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Run Scraper
        run: python parse_data.py

      - name: Commit & Push if changes
        run: |
          mv tools.json site-web/src/data/tools.json
          git config --global user.name 'GitHub Action Bot'
          git config --global user.email 'action@github.com'
          git add site-web/src/data/tools.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "bot: auto-update tools data" && git push)